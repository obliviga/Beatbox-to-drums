<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0f13" />
  <meta name="description" content="Beatbox into your microphone and hear it back as real drums — all in your browser." />
  <title>Beatbox → Drums</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Beatbox <span class="arrow">→</span> Drums</h1>
      <p class="tagline">Record your beatbox. Hear it back as drums.</p>
    </header>

    <section class="wave-section">
      <div class="wave-wrap">
        <canvas id="waveform" aria-label="Audio waveform"></canvas>
      </div>
      <p id="statusText" class="status" aria-live="polite">Press Record and beatbox — “B” kick · “Pss” snare · “Ts” hi-hat</p>
    </section>

    <section class="big-controls three">
      <button id="recBtn" class="big-btn rec">● Record</button>
      <button id="origBtn" class="big-btn orig" disabled>▶ Original</button>
      <button id="playBtn" class="big-btn play" disabled>▶ Drums</button>
    </section>

    <!-- Voice tuning is no longer needed: conversion now analyzes the whole
         clip and clusters your own sounds against each other (no training).
         Kept for a possible future "advanced" mode:
    <section class="tune-row">
      <button id="tuneBtn" class="tune-btn">🎯 Tune to my voice</button>
    </section>
    -->


    <footer class="footer">
      <p>Runs entirely in your browser — no audio leaves your device.</p>
      <p id="versionLine" class="version"></p>
    </footer>

    <!-- ================================================================
         Features below are temporarily disabled to keep the UI minimal
         while the core record→convert→play flow gets solid. The logic
         behind them still exists (and is unit-tested) — uncomment a
         section and js/main.js picks it up automatically.
         ================================================================

    <section class="mic-section">
      <button id="micBtn" class="mic-btn" aria-pressed="false">
        <span class="mic-icon">🎙️</span>
        <span id="micLabel" class="mic-label">Start</span>
      </button>
      <div class="meter" aria-hidden="true"><div id="meterFill" class="meter-fill"></div></div>
    </section>

    <section class="pads" aria-label="Drum pads">
      <button class="pad pad-kick" data-drum="kick">
        <span class="pad-name">KICK</span>
        <span class="pad-hint">“B” · key A</span>
      </button>
      <button class="pad pad-snare" data-drum="snare">
        <span class="pad-name">SNARE</span>
        <span class="pad-hint">“Pss” · key S</span>
      </button>
      <button class="pad pad-hat" data-drum="hat">
        <span class="pad-name">HI-HAT</span>
        <span class="pad-hint">“Ts” · key D</span>
      </button>
    </section>

    <section class="controls">
      <div class="control-group">
        <span class="control-label">Kit</span>
        <div class="chips" role="group" aria-label="Drum kit">
          <button class="chip active" data-kit="real">Real Kit</button>
          <button class="chip" data-kit="acoustic">Acoustic</button>
          <button class="chip" data-kit="tr808">808</button>
          <button class="chip" data-kit="trap">Trap</button>
          <button class="chip" data-kit="electro">Electro</button>
          <button class="chip" data-kit="lofi">Lo-Fi</button>
          <button class="chip" data-kit="perc">Perc</button>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label" for="sensSlider">Sensitivity</label>
        <input id="sensSlider" type="range" min="0" max="100" value="65" />
        <label class="inline-toggle" title="Blocks the mic briefly after each drum sound so speakers can't re-trigger it">
          <input id="guardChk" type="checkbox" /> 🔊 Speaker guard <span class="hint">(no headphones)</span>
        </label>
      </div>

      <div class="control-group">
        <span class="control-label">Groove</span>
        <div class="groove-row">
          <label class="inline-toggle"><input id="metChk" type="checkbox" /> Metronome</label>
          <label class="bpm-field">BPM
            <input id="bpmInput" type="number" min="40" max="240" step="1" value="90" inputmode="numeric" />
          </label>
        </div>
        <div class="style-row">
          <span class="style-label">Beat style</span>
          <div class="chips chips-sm" role="group" aria-label="Beat style">
            <button class="chip style-chip" data-style="raw">Raw</button>
            <button class="chip style-chip active" data-style="faithful">Faithful</button>
            <button class="chip style-chip" data-style="tight">Tight</button>
            <button class="chip style-chip" data-style="clean">Clean</button>
            <button class="chip style-chip" data-style="full">Full</button>
          </div>
        </div>
        <p class="hint-line">Record freely and the tempo is auto-detected.
        Raw = as played · Tight = snapped to 1/16s · Clean = doubles merged · Full = adds hats &amp; backbeat.
        Metronome adds a 4-beat count-in and locks bars to the click.</p>
      </div>

      <div class="control-group">
        <span class="control-label">Loop recorder</span>
        <div class="transport">
          <label class="loop-toggle"><input id="loopChk" type="checkbox" checked /> Loop</label>
          <button id="clearBtn" class="t-btn" disabled>✕ Clear</button>
          <button id="exportBtn" class="t-btn" disabled>⬇ WAV</button>
        </div>
        <div class="timeline-wrap">
          <canvas id="timeline" aria-label="Loop timeline"></canvas>
        </div>
        <p id="recCount" class="rec-count">No hits recorded</p>
      </div>
    </section>

    <section class="tip">
      <p>🎧 <strong>Use headphones</strong> — or turn on <strong>Speaker guard</strong> so the speakers can't re-trigger the mic.</p>
    </section>

    <section class="debug-section">
      <label class="debug-toggle"><input id="debugChk" type="checkbox" /> Show detection details</label>
      <p id="debugLine" class="debug-line" hidden>—</p>
    </section>

    ================================================================ -->
  </main>

  <noscript><p style="padding:2rem;text-align:center">This app needs JavaScript (and a microphone) to run.</p></noscript>
  <script type="module" src="js/main.js"></script>
</body>
</html>
